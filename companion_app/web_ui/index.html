<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Points Studio - React Concept</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#FF5400',
            cyanAccent: '#00F0FF',
            surface: '#0a0a0d',
            surfaceHover: '#16161d'
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- ESM Imports for React and Lucide -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?dev"
      }
    }
  </script>

  <!-- Babel to compile JSX in browser perfectly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React Application Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Folder, Play, Square, RotateCcw, Box, 
      Image as ImageIcon, Download, Terminal, 
      Activity, Settings, ChevronRight, Copy,
      CheckCircle2, AlertCircle, Clock, Maximize,
      Camera, ArrowUpRight, MousePointer2, Move, BoxSelect, Pipette,
      Edit2, Trash2, Database, Film, Video, Users, UserCircle2
    } from 'lucide-react';

    const pyApi = () => window.pywebview?.api;

    // --- MOCK DATA ---
    const PROJECTS = [
      { id: '1', name: 'стрът', status: 'ready', type: 'object', splats: '1,353,071', loss: '0.02583' },
      { id: '2', name: 'Sample Lego 12 Views', status: 'idle', type: 'sample', splats: '-', loss: '-' },
      { id: '3', name: 'Meow_Dataset_Final', status: 'ready', type: 'object', splats: '2,810,400', loss: '0.01944' },
      { id: '4', name: 'Smoke GSplat', status: 'failed', type: 'effect', splats: '-', loss: '-' },
      { id: '5', name: 'Room_Scan_v2', status: 'training', type: 'environment', splats: '850,210', loss: '0.1402' },
      { id: '6', name: 'Car_Engine_Part', status: 'ready', type: 'object', splats: '4,102,993', loss: '0.00812' },
    ];

    const MOCK_LOGS = [
      "[20:51:17] Train step 2950/3000: loss=0.01482, l1=0.00946, ssim=0.98073",
      "[20:51:17] Sh_degree=3, gaussians=1353071",
      "[20:51:20] Train step 2975/3000: loss=0.04422, l1=0.02383, ssim=0.91272",
      "[20:51:20] Sh_degree=3, gaussians=1353071",
      "[20:51:23] Train step 3000/3000: loss=0.02583, l1=0.01296, ssim=0.96519",
      "[20:51:23] Sh_degree=3, gaussians=1353071",
      "[20:51:36] Exporting trained splats to SketchUp format...",
      "[20:51:36] Saving manifest to \\exports\\стрът_20260406-205124\\scene_manifest.json",
      "[success] Export completed successfully. 1,353,071 splats processed."
    ];

    // --- COMPONENTS ---

    const StatusIndicator = ({ status }) => {
      const styles = {
        ready: 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.6)]',
        training: 'bg-[#FF5400] shadow-[0_0_10px_rgba(255,84,0,0.6)] animate-pulse',
        idle: 'bg-zinc-600',
        failed: 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.6)]'
      };
      return (
        <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${styles[status]}`} />
            <span className="text-[10px] uppercase tracking-wider font-semibold opacity-70 font-mono">
                {status}
            </span>
        </div>
      );
    };

    // Advanced Splat Animation
    const SplatVisualizer = ({ renderPercent }) => {
      const particles = useMemo(() => {
        return Array.from({ length: 180 }).map((_, i) => {
          const isCore = i < 100;
          
          const phi = Math.random() * Math.PI * 2;
          const costheta = Math.random() * 2 - 1;
          const u = Math.random();
          const theta = Math.acos(costheta);
          const r = isCore ? 120 * Math.cbrt(u) : 300 * Math.cbrt(u) + 50;
          
          const x = r * Math.sin(theta) * Math.cos(phi);
          const y = r * Math.sin(theta) * Math.sin(phi);
          const z = r * Math.cos(theta);

          const size = isCore ? Math.random() * 25 + 10 : Math.random() * 60 + 20;
          
          const colors = ['#FF5400', '#00F0FF', '#FF2E93', '#FAFAFA'];
          const color = colors[Math.floor(Math.random() * colors.length)];
          const opacity = isCore ? 0.95 : 0.35;
          const blurAmt = isCore ? Math.random() * 2 + 1 : Math.random() * 10 + 5;
          
          return {
            id: i,
            x: `${x}px`, 
            y: `${y}px`, 
            z: `${z}px`,
            rz: `${Math.random() * 360}deg`,
            width: `${size}px`,
            height: `${size * (Math.random() * 0.4 + 0.4)}px`,
            color: color,
            opacity: opacity,
            filter: `blur(${blurAmt}px)`,
            boxShadow: `0 0 ${blurAmt * 2}px ${color}`,
            delay: `${Math.random() * 4}s`,
            duration: `${Math.random() * 3 + 2}s`
          };
        });
      }, []);

      const visibleParticlesCount = Math.floor((renderPercent / 100) * particles.length);
      const visibleParticles = renderPercent === 0 ? [] : particles.slice(0, visibleParticlesCount);

      return (
        <div className="absolute inset-0 flex items-center justify-center overflow-hidden mix-blend-screen pointer-events-none" style={{perspective: '800px'}}>
          <div className="w-full h-full relative splat-container">
            {visibleParticles.map((p) => (
              <div
                key={p.id}
                className="absolute left-1/2 top-1/2 w-0 h-0"
                style={{
                  transform: `translate3d(${p.x}, ${p.y}, ${p.z})`,
                  transformStyle: 'preserve-3d'
                }}
              >
                <div className="splat-particle-rotator w-full h-full absolute">
                   <div 
                     className="splat-shape absolute"
                     style={{
                       '--pulse-dur': p.duration,
                       '--pulse-delay': p.delay,
                       width: p.width,
                       height: p.height,
                       backgroundColor: p.color,
                       opacity: p.opacity,
                       filter: p.filter,
                       boxShadow: p.boxShadow,
                       transform: `translate(-50%, -50%) rotateZ(${p.rz})`
                     }}
                   />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const NewProjectModal = ({ open, value, onChange, onCancel, onConfirm }) => {
      if (!open) return null;
      return (
        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md">
          <div className="w-[440px] rounded-2xl border border-white/10 bg-[#101016] p-6 shadow-[0_24px_80px_rgba(0,0,0,0.6)]">
            <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">New Project</div>
            <div className="text-2xl font-semibold text-white tracking-tight mb-3">Create a project from photos</div>
            <p className="text-sm text-zinc-400 leading-relaxed mb-5">
              Name the project first, then choose the photo set in the native file dialog.
            </p>
            <input
              autoFocus
              value={value}
              onChange={(event) => onChange(event.target.value)}
              onKeyDown={(event) => {
                if (event.key === 'Enter') {
                  onConfirm();
                }
              }}
              placeholder="Example: Red Vase Capture"
              className="w-full rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-white outline-none focus:border-[#FF5400]/40"
            />
            <div className="mt-5 flex justify-end gap-3">
              <button onClick={onCancel} className="px-4 py-2.5 rounded-xl border border-white/10 bg-white/[0.03] text-sm font-semibold text-zinc-200 hover:bg-white/[0.06]">
                Cancel
              </button>
              <button onClick={onConfirm} className="px-4 py-2.5 rounded-xl bg-[#FF5400] text-sm font-bold text-white hover:bg-[#FF6A22]">
                Choose Photos
              </button>
            </div>
          </div>
        </div>
      );
    };

    const TrainingSetupModal = ({ open, form, onChange, onCancel, onConfirm, restartMode, valid }) => {
      if (!open) return null;
      return (
        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md">
          <div className="w-[520px] rounded-2xl border border-white/10 bg-[#101016] p-6 shadow-[0_24px_80px_rgba(0,0,0,0.6)]">
            <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">
              {restartMode ? 'Restart Training' : 'Training Setup'}
            </div>
            <div className="text-2xl font-semibold text-white tracking-tight mb-3">
              {restartMode ? 'Restart with custom limits' : 'Choose training settings'}
            </div>
            <p className="text-sm text-zinc-400 leading-relaxed mb-5">
              Tune the main quality knobs before launch. Leave maximum splats at 0 to keep the automatic budget.
            </p>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <div className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Training Steps</div>
                <input
                  autoFocus
                  value={form.trainSteps}
                  onChange={(event) => onChange('trainSteps', event.target.value.replace(/[^\d]/g, ''))}
                  onKeyDown={(event) => {
                    if (event.key === 'Enter' && valid) {
                      onConfirm();
                    }
                  }}
                  placeholder="3000"
                  className="w-full rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-white outline-none focus:border-[#FF5400]/40"
                />
              </div>
              <div>
                <div className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Max Splats</div>
                <input
                  value={form.maxGaussians}
                  onChange={(event) => onChange('maxGaussians', event.target.value.replace(/[^\d]/g, ''))}
                  placeholder="0"
                  className="w-full rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-white outline-none focus:border-[#FF5400]/40"
                />
              </div>
              <div>
                <div className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Quality Preset</div>
                <select
                  value={form.qualityPreset}
                  onChange={(event) => onChange('qualityPreset', event.target.value)}
                  className="w-full rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-white outline-none focus:border-[#FF5400]/40"
                >
                  <option value="compact">Compact</option>
                  <option value="balanced">Balanced</option>
                  <option value="high">High</option>
                </select>
              </div>
              <div>
                <div className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Train Resolution</div>
                <input
                  value={form.trainResolution}
                  onChange={(event) => onChange('trainResolution', event.target.value.replace(/[^\d]/g, ''))}
                  placeholder="640"
                  className="w-full rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-white outline-none focus:border-[#FF5400]/40"
                />
              </div>
              <div className="col-span-2">
                <div className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">SfM Matching</div>
                <select
                  value={form.sfmMatchMode}
                  onChange={(event) => onChange('sfmMatchMode', event.target.value)}
                  className="w-full rounded-xl border border-white/10 bg-black/40 px-4 py-3 text-white outline-none focus:border-[#FF5400]/40"
                >
                  <option value="auto">Auto</option>
                  <option value="exhaustive">Exhaustive</option>
                  <option value="sequential">Sequential</option>
                  <option value="spatial">Spatial</option>
                </select>
              </div>
            </div>
            <div className={`mt-3 text-xs ${valid ? 'text-zinc-500' : 'text-rose-400'}`}>
              {valid ? 'Recommended starting point for video: Balanced, 768-960 resolution, max splats 800000-1200000.' : 'Check the numeric fields: steps 200-20000, max splats 0-5000000, train resolution 256-2048.'}
            </div>
            <div className="mt-5 flex justify-end gap-3">
              <button onClick={onCancel} className="px-4 py-2.5 rounded-xl border border-white/10 bg-white/[0.03] text-sm font-semibold text-zinc-200 hover:bg-white/[0.06]">
                Cancel
              </button>
              <button onClick={onConfirm} disabled={!valid} className={`px-4 py-2.5 rounded-xl text-sm font-bold text-white ${valid ? 'bg-[#FF5400] hover:bg-[#FF6A22]' : 'bg-[#FF5400]/50 cursor-not-allowed'}`}>
                {restartMode ? 'Restart Training' : 'Start Training'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const emptyTrainingForm = {
        trainSteps: '3000',
        maxGaussians: '0',
        qualityPreset: 'balanced',
        trainResolution: '640',
        sfmMatchMode: 'auto'
      };
      const [appState, setAppState] = useState(null);
      const [activeProjectId, setActiveProjectId] = useState(null);
      const [activeTab, setActiveTab] = useState('overview');
      const [newProjectOpen, setNewProjectOpen] = useState(false);
      const [newProjectName, setNewProjectName] = useState('');
      const [trainingModalOpen, setTrainingModalOpen] = useState(false);
      const [trainingForm, setTrainingForm] = useState(emptyTrainingForm);
      const [trainingRestartMode, setTrainingRestartMode] = useState(false);
      const logsEndRef = useRef(null);
      const previewHostRef = useRef(null);

      const projects = appState?.projects || [];
      const activeDetail = appState?.activeDetail || null;
      const activeProject = activeDetail?.project || null;
      const isTraining = ['running', 'queued', 'training'].includes(activeDetail?.statusPanel?.jobStatus);
      const progress = Number(activeDetail?.statusPanel?.progressPercent || 0);
      const liveLogs = activeDetail?.logs ? activeDetail.logs.split('\n').filter(Boolean) : MOCK_LOGS;
      const liveLoss = activeDetail?.statusPanel?.finalLoss || '0.02583';
      const elapsedTime = activeDetail?.statusPanel?.timeTotal || '01h 42m';
      const previewHasScene = Boolean(activeDetail?.preview?.hasScene);
      const liveMonitor = activeDetail?.liveMonitor || { state: 'idle', label: 'REST', detail: 'No active worker.', showStopPrompt: false };
      const liveStyles = {
        live: {
          text: 'text-emerald-400',
          border: 'border-emerald-500/20',
          dot: 'bg-emerald-400 shadow-[0_0_6px_#34d399]',
          panel: 'bg-emerald-500/10'
        },
        stale: {
          text: 'text-amber-300',
          border: 'border-amber-400/25',
          dot: 'bg-amber-300 shadow-[0_0_6px_#fbbf24]',
          panel: 'bg-amber-400/10'
        },
        silent: {
          text: 'text-rose-400',
          border: 'border-rose-500/30',
          dot: 'bg-rose-400 shadow-[0_0_7px_#fb7185]',
          panel: 'bg-rose-500/10'
        },
        failed: {
          text: 'text-rose-400',
          border: 'border-rose-500/30',
          dot: 'bg-rose-400 shadow-[0_0_7px_#fb7185]',
          panel: 'bg-rose-500/10'
        },
        idle: {
          text: 'text-zinc-200',
          border: 'border-white/15',
          dot: 'bg-zinc-300 shadow-[0_0_6px_#e4e4e7]',
          panel: 'bg-white/[0.045]'
        }
      };
      const liveStyle = liveStyles[liveMonitor.state] || liveStyles.idle;
      const liveLabelFallbacks = {
        idle: 'REST',
        stale: 'QUIET',
        silent: 'CHECK',
        failed: 'FAILED',
        live: 'LIVE'
      };
      const liveLabel = liveMonitor.label || liveLabelFallbacks[liveMonitor.state] || 'REST';

      const refresh = async (projectId = activeProjectId) => {
        if (!pyApi()) return;
        const result = await pyApi().refresh(projectId || null);
        if (result?.state) {
          setAppState(result.state);
          setActiveProjectId(result.state.activeProjectId || null);
        }
      };

      useEffect(() => {
        let intervalId = null;
        const bootstrap = async () => {
          if (!pyApi()) return;
          const result = await pyApi().boot();
          if (result?.state) {
            setAppState(result.state);
            setActiveProjectId(result.state.activeProjectId || null);
          }
          intervalId = window.setInterval(() => refresh(), 1200);
        };

        const handleReady = () => bootstrap();
        if (pyApi()) {
          bootstrap();
        } else {
          window.addEventListener('pywebviewready', handleReady, { once: true });
        }

        return () => {
          if (intervalId) {
            window.clearInterval(intervalId);
          }
          window.removeEventListener('pywebviewready', handleReady);
        };
      }, []);

      useEffect(() => {
        if (activeTab === 'logs' && logsEndRef.current) {
          logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [activeTab, activeDetail?.logs]);

      useEffect(() => {
        if (!pyApi() || !previewHostRef.current) return;
        const syncBounds = () => {
          const rect = previewHostRef.current.getBoundingClientRect();
          pyApi().set_preview_host({
            left: Math.round(rect.left),
            top: Math.round(rect.top),
            width: Math.round(rect.width),
            height: Math.round(rect.height),
            visible: previewHasScene
          });
        };
        syncBounds();
        window.addEventListener('resize', syncBounds);
        const observer = new ResizeObserver(syncBounds);
        observer.observe(previewHostRef.current);
        return () => {
          window.removeEventListener('resize', syncBounds);
          observer.disconnect();
        };
      }, [previewHasScene, activeProjectId]);

      const handleAction = async (method, ...args) => {
        if (!pyApi()) return;
        const result = await pyApi()[method](...args);
        if (result?.state) {
          setAppState(result.state);
          setActiveProjectId(result.state.activeProjectId || null);
        }
      };

      const openTrainingModal = (restartMode = false) => {
        if (!activeProjectId) return;
        const defaults = activeDetail?.trainingSettings || {};
        setTrainingRestartMode(restartMode);
        setTrainingForm({
          trainSteps: String(defaults.trainSteps || 3000),
          maxGaussians: String(defaults.maxGaussians || 0),
          qualityPreset: defaults.qualityPreset || 'balanced',
          trainResolution: String(defaults.trainResolution || 640),
          sfmMatchMode: defaults.sfmMatchMode || 'auto'
        });
        setTrainingModalOpen(true);
      };

      const updateTrainingForm = (key, value) => {
        setTrainingForm((current) => ({ ...current, [key]: value }));
      };

      const handleStartTraining = async () => {
        if (!activeProjectId) return;
        const parsedSteps = Number(trainingForm.trainSteps || '0');
        const parsedMaxGaussians = Number(trainingForm.maxGaussians || '0');
        const parsedTrainResolution = Number(trainingForm.trainResolution || '0');
        if (
          !Number.isInteger(parsedSteps) || parsedSteps < 200 || parsedSteps > 20000 ||
          !Number.isInteger(parsedMaxGaussians) || parsedMaxGaussians < 0 || parsedMaxGaussians > 5000000 ||
          !Number.isInteger(parsedTrainResolution) || parsedTrainResolution < 256 || parsedTrainResolution > 2048
        ) {
          return;
        }
        setActiveTab('logs');
        setTrainingModalOpen(false);
        await handleAction(
          trainingRestartMode ? 'restart_job' : 'start_job',
          activeProjectId,
          {
            train_steps: parsedSteps,
            max_gaussians: parsedMaxGaussians,
            quality_preset: trainingForm.qualityPreset || 'balanced',
            train_resolution: parsedTrainResolution,
            sfm_match_mode: trainingForm.sfmMatchMode || 'auto'
          }
        );
      };

      const handleStopTraining = async () => {
        if (!activeProjectId) return;
        await handleAction('stop_job', activeProjectId);
      };

      const handleCreateProject = async () => {
        if (!newProjectName.trim() || !pyApi()) return;
        const result = await pyApi().create_project(newProjectName.trim());
        if (result?.state) {
          setAppState(result.state);
          setActiveProjectId(result.state.activeProjectId || null);
        }
        setNewProjectOpen(false);
        setNewProjectName('');
      };

      const copyText = async (value) => {
        try {
          await navigator.clipboard.writeText(String(value || ''));
        } catch (_error) {
        }
      };

      const trainingStepsValue = Number(trainingForm.trainSteps || '0');
      const trainingMaxGaussiansValue = Number(trainingForm.maxGaussians || '0');
      const trainingResolutionValue = Number(trainingForm.trainResolution || '0');
      const trainingSettingsValid =
        Number.isInteger(trainingStepsValue) && trainingStepsValue >= 200 && trainingStepsValue <= 20000 &&
        Number.isInteger(trainingMaxGaussiansValue) && trainingMaxGaussiansValue >= 0 && trainingMaxGaussiansValue <= 5000000 &&
        Number.isInteger(trainingResolutionValue) && trainingResolutionValue >= 256 && trainingResolutionValue <= 2048;

      return (
        <div className="h-screen w-full flex flex-col bg-[#050505] text-white overflow-hidden relative font-sans">
          <div className="noise-bg" />
          
          {/* --- NATIVE APP MENU BAR --- */}
          <div className="h-8 border-b border-white/[0.08] flex items-center px-4 gap-4 text-[12px] text-zinc-400 bg-[#050505]/95 z-50 font-medium relative shadow-sm">
             <div className="flex items-center gap-2 mr-2">
                <Box className="w-3.5 h-3.5 text-[#FF5400]" />
                <span className="font-bold text-zinc-200 tracking-wide pr-2">Gaussian Points Studio</span>
             </div>
             
             <div className="flex items-center gap-4">
               <button className="hover:text-white transition-colors cursor-default">File</button>
               <button className="hover:text-white transition-colors cursor-default">Edit</button>
               <button className="hover:text-white transition-colors cursor-default">View</button>
               <button className="hover:text-white transition-colors cursor-default">Tools</button>
               <button className="hover:text-white transition-colors cursor-default">Window</button>
               <button className="hover:text-white transition-colors cursor-default">Help</button>
             </div>

             <div className="ml-auto flex items-center gap-4">
               <button className="flex items-center gap-1.5 hover:text-white transition-colors border-l border-white/5 pl-4 mr-1">
                 <Users className="w-3.5 h-3.5" />
                 Community Gallery
               </button>
               <button className="flex items-center gap-1.5 hover:text-white transition-colors text-[#00F0FF] bg-[#00F0FF]/10 px-2 py-0.5 rounded border border-[#00F0FF]/20">
                 <UserCircle2 className="w-3.5 h-3.5" />
                 Sign In
               </button>
             </div>
          </div>

          <div className="flex-1 flex overflow-hidden relative min-h-0">
            
            {/* --- EXTREME LEFT TOOLBAR --- */}
            <div className="w-[52px] border-r border-[#000] bg-[#050505] flex flex-col items-center py-4 gap-3 z-40 relative shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
               <button title="Select Tool" className="w-9 h-9 rounded-lg flex items-center justify-center transition-colors bg-[#FF5400]/10 text-[#FF5400] border border-[#FF5400]/30 shadow-[0_0_10px_rgba(255,84,0,0.2)]">
                   <MousePointer2 className="w-4 h-4" />
               </button>
               <button title="Move Tool" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
                   <Move className="w-4 h-4" />
               </button>
               <button title="Transform Tool" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">

                           <span className={`w-1.5 h-1.5 rounded-full ${liveStyle.dot} ${isTraining ? 'animate-pulse' : ''}`} />

                       </div>

                    <div className="flex-1 min-h-0 bg-[#020202] border border-white/[0.08] shadow-[inset_0_4px_20px_rgba(0,0,0,0.5)] rounded-xl p-4 overflow-y-auto custom-scrollbar font-mono text-[11px] leading-7 text-zinc-300">
                      {liveLogs.map((log, index) => {
                        const isTimestamp = log.startsWith('[');
                        const isSuccess = log.includes('[success]');
                        const isSystem = log.includes('[system]');
                        const isMetric = log.includes('loss=');
                        
                        if (isSystem) {
                          return (
                            <div key={index} className="hover:bg-white/[0.04] px-1 -mx-1 rounded transition-colors break-words text-zinc-500 italic">
                               &gt; {log.substring(8)}
                            </div>
                          )
                        }

                        return (
                          <div key={index} className="hover:bg-white/[0.04] px-1 -mx-1 rounded transition-colors break-words">
                            {isTimestamp ? (
                              <>
                                <span className="text-zinc-600 mr-2">{log.substring(0, 10)}</span>
                                <span className={
                                  isSuccess ? 'text-emerald-400 font-medium' : 
                                  isMetric ? 'text-[#00F0FF]' : 
                                  'text-zinc-300'
                                }>
                                  {log.substring(10)}
                                </span>
                              </>
                            ) : (
                              <span>{log}</span>
                            )}
                          </div>
                        );
                      })}
                      <div className="text-zinc-500 mt-2 flex items-center">
                        C:\Users\illia\Companion&gt; {isTraining ? '...' : <span className="terminal-cursor"></span>}

            restartMode={trainingRestartMode}
            valid={trainingSettingsValid}

    root.render(<App />);
