<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Points Studio - React Concept</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#FF5400',
            cyanAccent: '#00F0FF',
            surface: '#0a0a0d',
            surfaceHover: '#16161d'
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- ESM Imports for React and Lucide -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?dev"
      }
    }
  </script>

  <!-- Babel to compile JSX in browser perfectly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React Application Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Folder, Play, Square, RotateCcw, Box, 
      Image as ImageIcon, Download, Terminal, 
      Activity, Settings, ChevronRight, Copy,
      CheckCircle2, AlertCircle, Clock, Maximize,
      Camera, ArrowUpRight, MousePointer2, Move, BoxSelect, Pipette,
      Edit2, Trash2, Database, Film, Video, Users, UserCircle2
    } from 'lucide-react';

    // --- MOCK DATA ---
    const PROJECTS = [
      { id: '1', name: 'стрът', status: 'ready', type: 'object', splats: '1,353,071', loss: '0.02583' },
      { id: '2', name: 'Sample Lego 12 Views', status: 'idle', type: 'sample', splats: '-', loss: '-' },
      { id: '3', name: 'Meow_Dataset_Final', status: 'ready', type: 'object', splats: '2,810,400', loss: '0.01944' },
      { id: '4', name: 'Smoke GSplat', status: 'failed', type: 'effect', splats: '-', loss: '-' },
      { id: '5', name: 'Room_Scan_v2', status: 'training', type: 'environment', splats: '850,210', loss: '0.1402' },
      { id: '6', name: 'Car_Engine_Part', status: 'ready', type: 'object', splats: '4,102,993', loss: '0.00812' },
    ];

    const MOCK_LOGS = [
      "[20:51:17] Train step 2950/3000: loss=0.01482, l1=0.00946, ssim=0.98073",
      "[20:51:17] Sh_degree=3, gaussians=1353071",
      "[20:51:20] Train step 2975/3000: loss=0.04422, l1=0.02383, ssim=0.91272",
      "[20:51:20] Sh_degree=3, gaussians=1353071",
      "[20:51:23] Train step 3000/3000: loss=0.02583, l1=0.01296, ssim=0.96519",
      "[20:51:23] Sh_degree=3, gaussians=1353071",
      "[20:51:36] Exporting trained splats to SketchUp format...",
      "[20:51:36] Saving manifest to \\exports\\стрът_20260406-205124\\scene_manifest.json",
      "[success] Export completed successfully. 1,353,071 splats processed."
    ];

    // --- COMPONENTS ---

    const StatusIndicator = ({ status }) => {
      const styles = {
        ready: 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.6)]',
        training: 'bg-[#FF5400] shadow-[0_0_10px_rgba(255,84,0,0.6)] animate-pulse',
        idle: 'bg-zinc-600',
        failed: 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.6)]'
      };
      return (
        <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${styles[status]}`} />
            <span className="text-[10px] uppercase tracking-wider font-semibold opacity-70 font-mono">
                {status}
            </span>
        </div>
      );
    };

    // Advanced Splat Animation
    const SplatVisualizer = ({ renderPercent }) => {
      const particles = useMemo(() => {
        return Array.from({ length: 180 }).map((_, i) => {
          const isCore = i < 100;
          
          const phi = Math.random() * Math.PI * 2;
          const costheta = Math.random() * 2 - 1;
          const u = Math.random();
          const theta = Math.acos(costheta);
          const r = isCore ? 120 * Math.cbrt(u) : 300 * Math.cbrt(u) + 50;
          
          const x = r * Math.sin(theta) * Math.cos(phi);
          const y = r * Math.sin(theta) * Math.sin(phi);
          const z = r * Math.cos(theta);

          const size = isCore ? Math.random() * 25 + 10 : Math.random() * 60 + 20;
          
          const colors = ['#FF5400', '#00F0FF', '#FF2E93', '#FAFAFA'];
          const color = colors[Math.floor(Math.random() * colors.length)];
          const opacity = isCore ? 0.95 : 0.35;
          const blurAmt = isCore ? Math.random() * 2 + 1 : Math.random() * 10 + 5;
          
          return {
            id: i,
            x: `${x}px`, 
            y: `${y}px`, 
            z: `${z}px`,
            rz: `${Math.random() * 360}deg`,
            width: `${size}px`,
            height: `${size * (Math.random() * 0.4 + 0.4)}px`,
            color: color,
            opacity: opacity,
            filter: `blur(${blurAmt}px)`,
            boxShadow: `0 0 ${blurAmt * 2}px ${color}`,
            delay: `${Math.random() * 4}s`,
            duration: `${Math.random() * 3 + 2}s`
          };
        });
      }, []);

      const visibleParticlesCount = Math.floor((renderPercent / 100) * particles.length);
      const visibleParticles = renderPercent === 0 ? [] : particles.slice(0, visibleParticlesCount);

      return (
        <div className="absolute inset-0 flex items-center justify-center overflow-hidden mix-blend-screen pointer-events-none" style={{perspective: '800px'}}>
          <div className="w-full h-full relative splat-container">
            {visibleParticles.map((p) => (
              <div
                key={p.id}
                className="absolute left-1/2 top-1/2 w-0 h-0"
                style={{
                  transform: `translate3d(${p.x}, ${p.y}, ${p.z})`,
                  transformStyle: 'preserve-3d'
                }}
              >
                <div className="splat-particle-rotator w-full h-full absolute">
                   <div 
                     className="splat-shape absolute"
                     style={{
                       '--pulse-dur': p.duration,
                       '--pulse-delay': p.delay,
                       width: p.width,
                       height: p.height,
                       backgroundColor: p.color,
                       opacity: p.opacity,
                       filter: p.filter,
                       boxShadow: p.boxShadow,
                       transform: `translate(-50%, -50%) rotateZ(${p.rz})`
                     }}
                   />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const App = () => {
      const [activeProject, setActiveProject] = useState(PROJECTS[0]);
      const [activeTab, setActiveTab] = useState('overview'); // overview, logs, dataset
      const logsEndRef = useRef(null);

      // Training State
      const [isTraining, setIsTraining] = useState(false);
      const [progress, setProgress] = useState(100);
      const [liveLogs, setLiveLogs] = useState(MOCK_LOGS);
      const [liveLoss, setLiveLoss] = useState('0.02583');
      const [elapsedTime, setElapsedTime] = useState('01h 42m');

      // Auto-scroll logs
      useEffect(() => {
        if (activeTab === 'logs' && logsEndRef.current) {
          logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [activeTab, liveLogs]);

      const handleStartTraining = () => {
        if (isTraining) return;
        setIsTraining(true);
        setProgress(0);
        setLiveLogs([
          "[system] Initializing training pipeline...", 
          "[system] Compiling rendering kernels...",
          "[system] Allocating GPU memory... VRAM: 24GB active"
        ]);
        setElapsedTime('00m 00s');
        setActiveProject(prev => ({...prev, status: 'training'}));
        setActiveTab('logs');

        let step = 0;
        const maxSteps = 200;
        const interval = setInterval(() => {
          step += 1;
          const currentProgress = (step / maxSteps) * 100;
          setProgress(currentProgress);
          
          if (step % 10 === 0) {
            const loss = (Math.random() * 0.05 + 0.01).toFixed(5);
            const l1 = (Math.random() * 0.02 + 0.005).toFixed(5);
            setLiveLoss(loss);
            
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
            
            setLiveLogs(prev => [...prev, `${timeStr} Train step ${step * 15}/${maxSteps * 15}: loss=${loss}, l1=${l1}, ssim=0.88`]);
          }
          
          const m = Math.floor((step * 3) / 60);
          const s = (step * 3) % 60;
          setElapsedTime(`${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`);

          if (step >= maxSteps) {
            clearInterval(interval);
            setIsTraining(false);
            setActiveProject(prev => ({...prev, status: 'ready'}));
            setLiveLogs(prev => [...prev, "[success] Export completed successfully. Splats processed."]);
          }
        }, 60); 
      };

      const handleStopTraining = () => {
        if (!isTraining) return;
        setIsTraining(false);
        setActiveProject(prev => ({...prev, status: 'idle'}));
        setLiveLogs(prev => [...prev, "[system] Training aborted by user."]);
      };

      return (
        <div className="h-screen w-full flex flex-col bg-[#050505] text-white overflow-hidden relative font-sans">
          <div className="noise-bg" />
          
          {/* --- NATIVE APP MENU BAR --- */}
          <div className="h-8 border-b border-white/[0.08] flex items-center px-4 gap-4 text-[12px] text-zinc-400 bg-[#050505]/95 z-50 font-medium relative shadow-sm">
             <div className="flex items-center gap-2 mr-2">
                <Box className="w-3.5 h-3.5 text-[#FF5400]" />
                <span className="font-bold text-zinc-200 tracking-wide pr-2">Gaussian Points Studio</span>
             </div>
             
             <div className="flex items-center gap-4">
               <button className="hover:text-white transition-colors cursor-default">File</button>
               <button className="hover:text-white transition-colors cursor-default">Edit</button>
               <button className="hover:text-white transition-colors cursor-default">View</button>
               <button className="hover:text-white transition-colors cursor-default">Tools</button>
               <button className="hover:text-white transition-colors cursor-default">Window</button>
               <button className="hover:text-white transition-colors cursor-default">Help</button>
             </div>

             <div className="ml-auto flex items-center gap-4">
               <button className="flex items-center gap-1.5 hover:text-white transition-colors border-l border-white/5 pl-4 mr-1">
                 <Users className="w-3.5 h-3.5" />
                 Community Gallery
               </button>
               <button className="flex items-center gap-1.5 hover:text-white transition-colors text-[#00F0FF] bg-[#00F0FF]/10 px-2 py-0.5 rounded border border-[#00F0FF]/20">
                 <UserCircle2 className="w-3.5 h-3.5" />
                 Sign In
               </button>
             </div>
          </div>

          <div className="flex-1 flex overflow-hidden relative">
            
            {/* --- EXTREME LEFT TOOLBAR --- */}
            <div className="w-[52px] border-r border-[#000] bg-[#050505] flex flex-col items-center py-4 gap-3 z-40 relative shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
               <button title="Select Tool" className="w-9 h-9 rounded-lg flex items-center justify-center transition-colors bg-[#FF5400]/10 text-[#FF5400] border border-[#FF5400]/30 shadow-[0_0_10px_rgba(255,84,0,0.2)]">
                   <MousePointer2 className="w-4 h-4" />
               </button>
               <button title="Move Tool" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
                   <Move className="w-4 h-4" />
               </button>
               <button title="Transform Tool" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
                   <RotateCcw className="w-4 h-4" />
               </button>
               
               <div className="w-6 h-px bg-white/10 my-1" />
               
               <button title="Clipping Box Tool" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
                   <BoxSelect className="w-4 h-4" />
               </button>
               <button title="Color Picker" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
                   <Pipette className="w-4 h-4" />
               </button>

               <div className="mt-auto flex flex-col gap-3">
                   <button title="Preferences" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors">
                       <Settings className="w-4 h-4" />
                   </button>
               </div>
            </div>

            {/* --- MAIN GRID LAYOUT --- */}
            <div className="flex-1 relative grid grid-cols-[280px_1fr_360px] text-[14px]">

              {/* --- LEFT SIDEBAR: PROJECTS --- */}
              <aside className="border-r border-[var(--border-color)] bg-[#0A0A0D]/90 backdrop-blur-2xl flex flex-col z-20 relative">
                <div className="h-16 flex items-center px-6 border-b border-[var(--border-color)] justify-between">
                  <div className="font-bold text-zinc-200 tracking-wide uppercase text-xs">Project Explorer</div>
                </div>

                <div className="p-4">
                  <button className="w-full py-2.5 px-4 rounded-lg bg-white/[0.03] hover:bg-white/[0.08] border border-white/10 text-sm font-semibold transition-all flex items-center justify-center gap-2 text-white group">
                    <Camera className="w-4 h-4 text-zinc-400 group-hover:text-white transition-colors" />
                    New Project
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar px-3 pb-4">
                  <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-3 mt-1">Recent Local Projects</div>
                  <div className="space-y-[2px]">
                    {PROJECTS.map(project => {
                      const isActive = activeProject.id === project.id;
                      return (
                        <div
                          key={project.id}
                          onClick={() => {
                            if (!isTraining) {
                               setActiveProject(project);
                               setProgress(project.status === 'ready' ? 100 : 0);
                            }
                          }}
                          className={`w-full flex items-center justify-between px-3 py-3 rounded-lg transition-all duration-200 group relative cursor-pointer
                            ${isActive 
                              ? 'bg-gradient-to-r from-[#FF5400]/10 to-transparent border border-[#FF5400]/20 text-white' 
                              : 'text-zinc-400 hover:bg-white/[0.04] border border-transparent hover:text-white'
                            } ${isTraining && !isActive ? 'opacity-50 cursor-not-allowed' : ''}`}
                        >
                          {isActive && <div className="active-glow" />}
                          <div className="flex items-center gap-3 overflow-hidden">
                            <Folder className={`w-4 h-4 shrink-0 ${isActive ? 'text-[#FF5400]' : 'text-zinc-500 group-hover:text-zinc-300 transition-colors'}`} />
                            <span className="text-sm truncate text-left font-medium select-none">{project.name}</span>
                          </div>
                          
                          {/* Hover Actions / Status */}
                          <div className="relative flex items-center justify-end w-[50px] shrink-0">
                            <div className={`absolute flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity ${isTraining ? 'hidden' : ''}`}>
                               <button className="p-1 hover:bg-white/10 rounded text-zinc-400 hover:text-white" title="Rename" onClick={(e) => e.stopPropagation()}><Edit2 className="w-3.5 h-3.5" /></button>
                               <button className="p-1 hover:bg-rose-500/20 rounded text-zinc-400 hover:text-rose-400" title="Delete" onClick={(e) => e.stopPropagation()}><Trash2 className="w-3.5 h-3.5" /></button>
                            </div>
                            <div className={`transition-opacity duration-200 ${isTraining ? '' : 'group-hover:opacity-0'}`}>
                               <StatusIndicator status={isActive && isTraining ? 'training' : project.status} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </aside>

              {/* --- MAIN CONTENT --- */}
              <main className="flex-1 flex flex-col relative bg-[#050505] overflow-hidden z-10">
                
                {/* Header Toolbar */}
                <header className="h-16 border-b border-[var(--border-color)] bg-[#0A0A0D]/50 backdrop-blur-md px-6 flex items-center justify-between z-20">
                  <div className="flex items-center gap-4">
                    <h2 className="text-xl font-semibold text-white tracking-tight">{activeProject.name}</h2>
                    <div className={`px-2.5 py-1 rounded-md border text-xs font-mono flex items-center gap-1.5 ${
                      activeProject.status === 'ready' ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' :
                      activeProject.status === 'training' ? 'bg-[#FF5400]/10 border-[#FF5400]/20 text-[#FF5400]' :
                      activeProject.status === 'failed' ? 'bg-rose-500/10 border-rose-500/20 text-rose-400' :
                      'bg-zinc-500/10 border-zinc-500/20 text-zinc-400'
                    }`}>
                      <Activity className="w-3.5 h-3.5" />
                      {activeProject.status.toUpperCase()}
                    </div>
                  </div>

                  <div className="flex items-center gap-3">
                    <button className="h-8 px-4 rounded-lg border border-white/10 bg-transparent hover:bg-white/5 text-sm font-medium transition-colors flex items-center gap-2 text-white" disabled={isTraining}>
                      <ImageIcon className="w-4 h-4 text-zinc-400" />
                      Add Dataset
                    </button>
                    <div className="w-px h-6 bg-white/10 mx-1" />
                    <div className="flex bg-black/40 rounded-lg p-1 border border-white/5 shadow-inner">
                      <button 
                         onClick={handleStartTraining}
                         disabled={isTraining || activeProject.status === 'ready'}
                         className={`h-8 px-4 rounded-md font-bold text-sm flex items-center gap-2 transition-all ${
                           isTraining || activeProject.status === 'ready'
                             ? 'bg-[#FF5400]/50 text-white/50 cursor-not-allowed' 
                             : 'bg-[#FF5400] hover:bg-[#FF6A22] text-white shadow-[0_0_15px_rgba(255,84,0,0.3)]'
                         }`}>
                        <Play className="w-4 h-4 fill-current" />
                        {isTraining ? 'Training...' : 'Train Model'}
                      </button>
                      <button className="h-8 w-10 flex items-center justify-center rounded-md hover:bg-white/10 text-zinc-400 transition-colors" disabled={isTraining}>
                        <RotateCcw className="w-4 h-4" />
                      </button>
                      <button onClick={handleStopTraining} className="h-8 w-10 flex items-center justify-center rounded-md hover:bg-white/5 text-rose-500 hover:text-rose-400 transition-colors" disabled={!isTraining}>
                        <Square className="w-4 h-4 fill-current" />
                      </button>
                    </div>
                  </div>
                </header>

                {/* Viewport Area */}
                <div className="flex-1 relative group cursor-crosshair">
                  {/* Point Cloud Dots Pattern */}
                  <div 
                    className="absolute inset-0 bg-dot-pattern opacity-100" 
                    style={{
                      maskImage: 'radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%)',
                      WebkitMaskImage: 'radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%)'
                    }} 
                  />
                  <div className="absolute inset-0 bg-radial-gradient from-transparent to-[#050505] opacity-80 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at center, transparent 0%, #050505 100%)' }} />
                  
                  {/* 3D Splat Concept */}
                  <SplatVisualizer renderPercent={progress} />

                  {/* Top left overlay */}
                  <div className="absolute top-6 left-6 glass-panel rounded-xl p-3 flex gap-6 text-xs text-white/80 shadow-2xl z-10 transition-transform hover:scale-[1.02]">
                    <div className="flex flex-col">
                      <span className="text-zinc-500 uppercase text-[9px] font-bold tracking-widest mb-0.5">Splats</span>
                      <span className="font-mono text-[#00F0FF] font-semibold">
                         {isTraining 
                            ? Math.floor((progress / 100) * 1353071).toLocaleString() 
                            : activeProject.splats}
                      </span>
                    </div>
                    <div className="w-px h-full bg-white/10" />
                    <div className="flex flex-col">
                      <span className="text-zinc-500 uppercase text-[9px] font-bold tracking-widest mb-0.5">Performance</span>
                      <span className="font-mono font-medium">{isTraining ? '24.1 FPS' : '60.2 FPS'}</span>
                    </div>
                  </div>

                  {/* Viewport Right Tools */}
                  <div className="absolute top-6 right-6 flex flex-col gap-2 z-10">
                    <button className="w-10 h-10 glass-panel rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors group/btn shadow-xl">
                      <Maximize className="w-4 h-4 text-zinc-400 group-hover/btn:text-white" />
                    </button>
                  </div>

                  {/* Bottom Hotkeys hint */}
                  <div className="absolute bottom-6 left-6 right-6 flex justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10">
                    <div className="glass-panel px-5 py-2.5 rounded-full text-xs text-zinc-400 flex items-center gap-5 shadow-xl">
                      <div className="flex items-center"><kbd className="font-sans px-1.5 py-0.5 bg-white/10 rounded mr-2 text-white font-medium border border-white/10">LMB</kbd> Orbit</div>
                      <div className="flex items-center"><kbd className="font-sans px-1.5 py-0.5 bg-white/10 rounded mr-2 text-white font-medium border border-white/10">Shift+LMB</kbd> Pan</div>
                      <div className="flex items-center"><kbd className="font-sans px-1.5 py-0.5 bg-white/10 rounded mr-2 text-white font-medium border border-white/10">Scroll</kbd> Zoom</div>
                    </div>
                  </div>
                </div>
              </main>

              {/* --- RIGHT SIDEBAR: INSPECTOR --- */}
              <aside className="border-l border-[var(--border-color)] bg-[#0A0A0D]/90 backdrop-blur-2xl flex flex-col z-20 relative shadow-[-10px_0_30px_rgba(0,0,0,0.5)]">
                
                {/* Tabs */}
                <div className="flex px-4 pt-4 border-b border-[var(--border-color)] shrink-0 pb-0">
                  <button 
                    onClick={() => setActiveTab('overview')}
                    className={`flex-1 pb-3 text-xs font-bold border-b-2 transition-all flex items-center justify-center gap-2
                      ${activeTab === 'overview' ? 'border-[#FF5400] text-white' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                  >
                    <Activity className="w-4 h-4" />
                    Inspect
                  </button>
                  <button 
                    onClick={() => setActiveTab('logs')}
                    className={`flex-1 pb-3 text-xs font-bold border-b-2 transition-all flex items-center justify-center gap-2
                      ${activeTab === 'logs' ? 'border-[#FF5400] text-white' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                  >
                    <Terminal className="w-4 h-4" />
                    Console
                  </button>
                  <button 
                    onClick={() => setActiveTab('dataset')}
                    className={`flex-1 pb-3 text-xs font-bold border-b-2 transition-all flex items-center justify-center gap-1.5
                      ${activeTab === 'dataset' ? 'border-[#FF5400] text-white' : 'border-transparent text-zinc-500 hover:text-zinc-300'}`}
                  >
                    <Database className="w-4 h-4" />
                    Dataset
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto custom-scrollbar p-5">
                  
                  {/* --- OVERVIEW TAB --- */}
                  <div className={`space-y-8 ${activeTab === 'overview' ? 'block' : 'hidden'}`}>
                    
                    {/* Status Card */}
                    <section>
                      <h3 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                        Job Progress <span className="flex-1 h-px bg-white/5"></span>
                      </h3>
                      <div className="glass-panel rounded-xl p-5 border border-white/5 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-white/5">
                          <div 
                            className={`h-full transition-all duration-300 ease-out ${activeProject.status === 'ready' || progress === 100 ? 'bg-emerald-500' : isTraining ? 'bg-[#FF5400]' : 'bg-zinc-500'}`} 
                            style={{ width: `${Math.round(progress)}%` }}
                          />
                        </div>
                        
                        <div className="flex justify-between items-start mb-5 mt-2">
                          <div>
                            <div className="text-3xl font-light text-white font-mono">
                              {Math.round(progress)}%
                            </div>
                            <div className="text-xs text-zinc-400 mt-1 capitalize">{isTraining ? 'Training Phase' : activeProject.status === 'ready' ? 'Ready' : '-'}</div>
                          </div>
                          <div className={`w-10 h-10 rounded-full border-2 flex items-center justify-center bg-[#050505]
                            ${(activeProject.status === 'ready' || progress === 100) && !isTraining ? 'border-emerald-500/30' : 'border-[#FF5400]/30'}`}>
                            {(activeProject.status === 'ready' || progress === 100) && !isTraining ? (
                              <CheckCircle2 className="w-5 h-5 text-emerald-400" />
                            ) : isTraining ? (
                              <Clock className="w-5 h-5 text-[#FF5400] animate-spin-slow" />
                            ) : (
                              <AlertCircle className="w-5 h-5 text-zinc-500" />
                            )}
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3 text-xs font-mono">
                          <div className="bg-[#050505]/50 p-2.5 rounded-lg border border-white/5">
                            <div className="text-zinc-500 mb-1 font-sans font-medium">Time {isTraining ? 'Elapsed' : 'Total'}</div>
                            <div className={`text-white ${isTraining ? 'animate-pulse' : ''}`}>{elapsedTime}</div>
                          </div>
                          <div className="bg-[#050505]/50 p-2.5 rounded-lg border border-white/5">
                            <div className="text-zinc-500 mb-1 font-sans font-medium">{isTraining ? 'Live Loss' : 'Final Loss'}</div>
                            <div className="text-[#00F0FF]">{isTraining ? liveLoss : activeProject.loss}</div>
                          </div>
                        </div>
                      </div>
                    </section>

                    {/* Details list */}
                    <section>
                      <h3 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2">
                        Model Properties <span className="flex-1 h-px bg-white/5"></span>
                      </h3>
                      <div className="space-y-1">
                        <div className="flex justify-between items-center text-sm py-2 px-1 hover:bg-white/5 rounded transition-colors group">
                          <span className="text-zinc-400 font-medium">Source Directory</span>
                          <button className="text-zinc-300 hover:text-white flex items-center gap-1.5 text-xs bg-white/5 px-2 py-1 rounded border border-white/5">
                            Copy Path <Copy className="w-3 h-3 group-hover:text-[#FF5400] transition-colors" />
                          </button>
                        </div>
                        <div className="flex justify-between items-center text-sm py-2 px-1 hover:bg-white/5 rounded transition-colors">
                          <span className="text-zinc-400 font-medium">Image Count</span>
                          <span className="font-mono text-white">42 Frames</span>
                        </div>
                        <div className="flex justify-between items-center text-sm py-2 px-1 hover:bg-white/5 rounded transition-colors">
                          <span className="text-zinc-400 font-medium">Resolution</span>
                          <span className="font-mono text-white">1920x1080</span>
                        </div>
                      </div>
                    </section>

                    {/* Integration Block */}
                    <section>
                      <div className={`glass-panel rounded-xl p-5 border border-white/10 relative overflow-hidden group transition-all duration-300 ${isTraining ? 'opacity-50 grayscale pointer-events-none' : ''}`}>
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#FF5400]/5 blur-[40px] rounded-full mix-blend-screen pointer-events-none transform translate-x-10 -translate-y-10 transition-all duration-500 group-hover:bg-[#00F0FF]/15" />
                        
                        <h3 className="text-sm font-semibold text-white mb-2 relative z-10 flex items-center gap-2">
                           <Download className="w-4 h-4 text-[#00F0FF]" /> Export Options
                        </h3>
                        <p className="text-xs text-zinc-400 leading-relaxed mb-4 relative z-10">
                          Trained splats are compiled and ready. Choose a destination format to export the geometry.
                        </p>
                        <div className="flex flex-col gap-2 relative z-10">
                          <button className="w-full py-2.5 rounded-lg bg-white/[0.04] hover:bg-white/[0.08] text-white border border-white/5 hover:border-white/20 text-sm font-semibold transition-all flex items-center justify-center gap-2">
                            <Download className="w-4 h-4 text-zinc-400" />
                            Export to .ply file
                          </button>
                          <button className="w-full py-2.5 rounded-lg bg-gradient-to-r from-[#FF5400] to-[#FF2E93] hover:opacity-90 text-white shadow-[0_0_20px_rgba(255,84,0,0.25)] border border-transparent text-sm font-bold transition-all flex items-center justify-center gap-2">
                            <ArrowUpRight className="w-4 h-4" />
                            Export directly to SketchUp
                          </button>
                        </div>
                      </div>
                    </section>
                  </div>

                  {/* --- DATASET TAB --- */}
                  <div className={`h-full flex flex-col ${activeTab === 'dataset' ? 'flex' : 'hidden'}`}>
                    <div className="flex items-center justify-between mb-4">
                       <h3 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                          Captured Media <span className="w-12 h-px bg-white/5"></span>
                       </h3>
                       <button className="text-[10px] text-[#00F0FF] hover:text-white transition-colors" title="Clear All Media">Clear All</button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 mb-4">
                       <div className="grid grid-cols-3 gap-2">
                          
                          {/* Local Uploaded Photos */}
                          {['r_0.png', 'r_8.png', 'r_16.png', 'r_24.png', 'r_32.png', 'r_40.png', 'r_48.png', 'r_56.png', 'r_64.png', 'r_72.png', 'r_80.png', 'r_88.png'].map((filename, i) => (
                             <div key={i} className="aspect-square bg-[#050505] rounded-md border border-white/5 relative group overflow-hidden cursor-pointer shadow-lg hover:border-white/20 transition-colors">
                                <img src={`Photos/${filename}`} className="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" />
                                <button className="absolute top-1 right-1 p-1 bg-black/60 rounded backdrop-blur opacity-0 group-hover:opacity-100 hover:bg-rose-500 text-white transition-all">
                                  <Trash2 className="w-3 h-3" />
                                </button>
                                <div className="absolute bottom-1 left-1 text-[8px] font-mono bg-black/60 px-1 rounded text-white/80 backdrop-blur">{filename}</div>
                             </div>
                          ))}

                          {/* Mock Video Extracted Folder Concept */}
                          <div className="aspect-square bg-[#050505] rounded-md border border-white/5 relative group overflow-hidden cursor-pointer shadow-lg outline outline-1 outline-offset-[-1px] outline-transparent hover:outline-[#00F0FF] transition-all">
                             <img src={`Photos/r_0.png`} className="w-full h-full object-cover opacity-40 group-hover:opacity-80 filter blur-[2px] transition-all" />
                             <div className="absolute inset-0 flex flex-col items-center justify-center opacity-90 pointer-events-none drop-shadow-lg gap-1">
                               <Film className="w-5 h-5 text-white/90" />
                               <span className="text-[9px] font-bold text-white bg-black/40 px-1.5 rounded">30 FPS</span>
                             </div>
                             <button className="absolute top-1 right-1 p-1 bg-black/60 rounded backdrop-blur opacity-0 group-hover:opacity-100 hover:bg-rose-500 text-white transition-all">
                                  <Trash2 className="w-3 h-3" />
                             </button>
                             <div className="absolute bottom-1 left-1 text-[8px] font-mono bg-black/60 px-1 rounded text-[#00F0FF] backdrop-blur text-shadow">GOPR0042.MP4</div>
                          </div>
                          
                       </div>
                    </div>
                    
                    <button className="w-full py-3.5 rounded-xl bg-white/[0.02] hover:bg-white/[0.05] border border-white/10 hover:border-white/30 border-dashed text-sm font-semibold transition-all flex items-center justify-center gap-2 text-zinc-400 hover:text-white shrink-0">
                      <ImageIcon className="w-4 h-4" />
                      Add Photos or Video
                    </button>
                  </div>

                  {/* --- LOGS TAB --- */}
                  <div className={`h-full flex flex-col ${activeTab === 'logs' ? 'flex' : 'hidden'}`}>
                    <div className="flex items-center justify-between mb-4">
                       <h3 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                          Live Output <span className="w-12 h-px bg-white/5"></span>
                       </h3>
                       <div className="glass-panel px-2 py-1 rounded inline-flex items-center gap-1.5 text-[10px] uppercase font-bold text-emerald-400 border border-emerald-500/20">
                         <span className={`w-1.5 h-1.5 rounded-full ${isTraining ? 'bg-[#FF5400] shadow-[0_0_5px_#FF5400]' : 'bg-emerald-400 shadow-[0_0_5px_#34d399]'} animate-pulse`} />
                         {isTraining ? 'Training' : 'Live'}
                       </div>
                    </div>
                    
                    <div className="flex-1 bg-[#020202] border border-white/[0.08] shadow-[inset_0_4px_20px_rgba(0,0,0,0.5)] rounded-xl p-4 overflow-y-auto custom-scrollbar font-mono text-[11px] leading-7 text-zinc-300">
                      {liveLogs.map((log, index) => {
                        const isTimestamp = log.startsWith('[');
                        const isSuccess = log.includes('[success]');
                        const isSystem = log.includes('[system]');
                        const isMetric = log.includes('loss=');
                        
                        if (isSystem) {
                          return (
                            <div key={index} className="hover:bg-white/[0.04] px-1 -mx-1 rounded transition-colors break-words text-zinc-500 italic">
                               &gt; {log.substring(8)}
                            </div>
                          )
                        }

                        return (
                          <div key={index} className="hover:bg-white/[0.04] px-1 -mx-1 rounded transition-colors break-words">
                            {isTimestamp ? (
                              <>
                                <span className="text-zinc-600 mr-2">{log.substring(0, 10)}</span>
                                <span className={
                                  isSuccess ? 'text-emerald-400 font-medium' : 
                                  isMetric ? 'text-[#00F0FF]' : 
                                  'text-zinc-300'
                                }>
                                  {log.substring(10)}
                                </span>
                              </>
                            ) : (
                              <span>{log}</span>
                            )}
                          </div>
                        );
                      })}
                      <div className="text-zinc-500 mt-2 flex items-center">
                        C:\Users\illia\Companion&gt; {isTraining ? '...' : <span className="terminal-cursor"></span>}
                      </div>
                      <div ref={logsEndRef} />
                    </div>
                  </div>

                </div>
              </aside>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
