<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Points Studio - React Concept</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#FF5400',
            cyanAccent: '#00F0FF',
            surface: '#0a0a0d',
            surfaceHover: '#16161d'
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* Hide scrollbars across the application */
    .custom-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .custom-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
    .animate-shake {
      animation: shake 0.4s ease-in-out;
    }
  </style>

  <!-- ESM Imports for React and Lucide -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?dev"
      }
    }
  </script>

  <!-- Babel to compile JSX in browser perfectly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React Application Code -->
  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Folder, Play, Square, RotateCcw, Box, 
      Image as ImageIcon, Download, Terminal, 
      Activity, Settings, ChevronRight, Copy,
      CheckCircle2, AlertCircle, Clock, Maximize,
      Camera, ArrowUpRight, MousePointer2, Move, BoxSelect, Pipette,
      Edit2, Trash2, Database, Film, Video, Users, UserCircle2,
      Layers, Droplets, TrendingUp, Loader2, X, AlertTriangle, XCircle
    } from 'lucide-react';

    // --- MOCK DATA ---
    const PROJECTS = [
      { id: '1', name: 'стрът', status: 'ready', type: 'object', splats: '1,353,071', loss: '0.02583' },
      { id: '2', name: 'Sample Lego 12 Views', status: 'idle', type: 'sample', splats: '-', loss: '-' },
      { id: '3', name: 'Meow_Dataset_Final', status: 'ready', type: 'object', splats: '2,810,400', loss: '0.01944' },
      { id: '4', name: 'Smoke GSplat', status: 'failed', type: 'effect', splats: '-', loss: '-' },
      { id: '5', name: 'Room_Scan_v2', status: 'training', type: 'environment', splats: '850,210', loss: '0.1402' },
      { id: '6', name: 'Car_Engine_Part', status: 'ready', type: 'object', splats: '4,102,993', loss: '0.00812' },
    ];

    const MOCK_LOGS = [
      "[20:51:17] Train step 2950/3000: loss=0.01482, l1=0.00946, ssim=0.98073",
      "[20:51:17] Sh_degree=3, gaussians=1353071",
      "[20:51:20] Train step 2975/3000: loss=0.04422, l1=0.02383, ssim=0.91272",
      "[20:51:20] Sh_degree=3, gaussians=1353071",
      "[20:51:23] Train step 3000/3000: loss=0.02583, l1=0.01296, ssim=0.96519",
      "[20:51:23] Sh_degree=3, gaussians=1353071",
      "[20:51:36] Exporting trained splats to SketchUp format...",
      "[20:51:36] Saving manifest to \\exports\\стрът_20260406-205124\\scene_manifest.json",
      "[success] Export completed successfully. 1,353,071 splats processed."
    ];

    const SKETCHUP_PROCESSES = [
      { id: 'skp1', name: 'Museum_Plaza_Redesign.skp', desc: 'Active Workspace • SketchUp', image: 'Photos/r_0.png' },
      { id: 'skp2', name: 'Building_B_Interior.skp', desc: 'Background • SketchUp', image: 'Photos/r_24.png' },
      { id: 'skp3', name: 'Untitled.skp', desc: 'Background • SketchUp', image: 'Photos/r_48.png' }
    ];

    // --- COMPONENTS ---

    const StatusIndicator = ({ status }) => {
      const styles = {
        ready: 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.6)]',
        training: 'bg-[#FF5400] shadow-[0_0_10px_rgba(255,84,0,0.6)] animate-pulse',
        idle: 'bg-zinc-600',
        failed: 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.6)]'
      };
      return (
        <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${styles[status]}`} />
            <span className="text-[10px] uppercase tracking-wider font-semibold opacity-70 font-mono">
                {status}
            </span>
        </div>
      );
    };

    // Advanced Splat Animation
    const SplatVisualizer = ({ renderPercent }) => {
      const particles = useMemo(() => {
        return Array.from({ length: 180 }).map((_, i) => {
          const isCore = i < 100;
          
          const phi = Math.random() * Math.PI * 2;
          const costheta = Math.random() * 2 - 1;
          const u = Math.random();
          const theta = Math.acos(costheta);
          const r = isCore ? 120 * Math.cbrt(u) : 300 * Math.cbrt(u) + 50;
          
          const x = r * Math.sin(theta) * Math.cos(phi);
          const y = r * Math.sin(theta) * Math.sin(phi);
          const z = r * Math.cos(theta);

          const size = isCore ? Math.random() * 25 + 10 : Math.random() * 60 + 20;
          
          const colors = ['#FF5400', '#00F0FF', '#FF2E93', '#FAFAFA'];
          const color = colors[Math.floor(Math.random() * colors.length)];
          const opacity = isCore ? 0.95 : 0.35;
          const blurAmt = isCore ? Math.random() * 2 + 1 : Math.random() * 10 + 5;
          
          return {
            id: i,
            x: `${x}px`, 
            y: `${y}px`, 
            z: `${z}px`,
            rz: `${Math.random() * 360}deg`,
            width: `${size}px`,
            height: `${size * (Math.random() * 0.4 + 0.4)}px`,
            color: color,
            opacity: opacity,
            filter: `blur(${blurAmt}px)`,
            boxShadow: `0 0 ${blurAmt * 2}px ${color}`,
            delay: `${Math.random() * 4}s`,
            duration: `${Math.random() * 3 + 2}s`
          };
        });
      }, []);

      const visibleParticlesCount = Math.floor((renderPercent / 100) * particles.length);
      const visibleParticles = renderPercent === 0 ? [] : particles.slice(0, visibleParticlesCount);

      return (
        <div className="absolute inset-0 flex items-center justify-center overflow-hidden mix-blend-screen pointer-events-none" style={{perspective: '800px'}}>
          <div className="w-full h-full relative splat-container">
            {visibleParticles.map((p) => (
              <div
                key={p.id}
                className="absolute left-1/2 top-1/2 w-0 h-0"
                style={{
                  transform: `translate3d(${p.x}, ${p.y}, ${p.z})`,
                  transformStyle: 'preserve-3d'
                }}
              >
                <div className="splat-particle-rotator w-full h-full absolute">
                   <div 
                     className="splat-shape absolute"
                     style={{
                       '--pulse-dur': p.duration,
                       '--pulse-delay': p.delay,
                       width: p.width,
                       height: p.height,
                       backgroundColor: p.color,
                       opacity: p.opacity,
                       filter: p.filter,
                       boxShadow: p.boxShadow,
                       transform: `translate(-50%, -50%) rotateZ(${p.rz})`
                     }}
                   />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // --- DROPDOWN COMPONENTS ---
    const MenuSeparator = () => <div className="h-px bg-white/10 my-1.5 mx-2" />;

    const MenuItem = ({ icon: Icon, label, shortcut, children }) => {
      const [isOpen, setIsOpen] = useState(false);
      const isSubmenu = !!children;
      
      return (
        <div 
          className="relative group menu-item-wrapper"
          onMouseEnter={() => setIsOpen(true)}
          onMouseLeave={() => setIsOpen(false)}
        >
          <button className={`w-full flex items-center justify-between px-3 py-1.5 text-xs transition-colors hover:bg-white/[0.08] hover:text-white text-zinc-300 rounded-md
            ${isOpen ? 'bg-white/[0.08] text-white' : ''}`}>
            <div className="flex items-center gap-2.5">
              {Icon ? <Icon className="w-3.5 h-3.5 opacity-60 group-hover:opacity-100 group-hover:text-[#00F0FF] transition-colors shrink-0" /> : <div className="w-3.5 h-3.5 shrink-0" />}
              <span className="font-medium tracking-wide text-left whitespace-nowrap">{label}</span>
            </div>
            {shortcut && <span className="text-[9px] text-zinc-500 font-mono tracking-widest pl-6 shrink-0 whitespace-nowrap">{shortcut}</span>}
            {isSubmenu && <ChevronRight className="w-3.5 h-3.5 text-zinc-500 group-hover:text-white ml-2 transition-colors shrink-0" />}
          </button>
          
          {isSubmenu && (
            <div 
              className={`absolute top-0 left-[calc(100%-4px)] min-w-[180px] bg-[#0E0E12]/95 backdrop-blur-2xl border border-white/10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] p-1.5 transition-all duration-200 origin-top-left z-[100] ${isOpen ? 'opacity-100 visible scale-100 translate-x-0' : 'opacity-0 invisible scale-95 -translate-x-2'}`}
            >
              {children}
            </div>
          )}
        </div>
      );
    }

    const TopMenuDropdown = ({ label, children }) => {
      const [isOpen, setIsOpen] = useState(false);

      return (
        <div 
          className="relative h-full flex items-center"
          onMouseEnter={() => setIsOpen(true)}
          onMouseLeave={() => setIsOpen(false)}
        >
          <button className={`px-2.5 py-1 rounded-md transition-all cursor-default text-xs font-medium ${isOpen ? 'bg-white/10 text-white shadow-inner' : 'text-zinc-400 hover:text-white hover:bg-white/5'}`}>
            {label}
          </button>
          
          <div 
            className={`absolute top-[calc(100%+2px)] left-0 min-w-[200px] bg-[#0E0E12]/95 backdrop-blur-2xl border border-white/10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.8)] p-1.5 transition-all duration-200 origin-top z-[100] ${isOpen ? 'opacity-100 visible scale-100 translate-y-0' : 'opacity-0 invisible scale-95 -translate-y-2'}`}
          >
            {children}
          </div>
        </div>
      );
    };

    const App = () => {
      const [activeProject, setActiveProject] = useState(PROJECTS[0]);
      const [activeTab, setActiveTab] = useState('overview'); // overview, logs, dataset
      const [activeLeftTab, setActiveLeftTab] = useState('projects');
      const [isAdvancedMetricsOpen, setIsAdvancedMetricsOpen] = useState(false);
      const [isSketchUpModalOpen, setIsSketchUpModalOpen] = useState(false);
      const [sketchUpExportState, setSketchUpExportState] = useState('idle'); // idle, loading, success, failed
      const [selectedProcess, setSelectedProcess] = useState('skp1');
      const [exportErrorMsg, setExportErrorMsg] = useState(null);
      const logsEndRef = useRef(null);

      const getToolbarBtnClass = (id) => {
        const isActive = activeLeftTab === id;
        return `w-9 h-9 rounded-lg flex items-center justify-center transition-all duration-200 ${
          isActive 
            ? 'bg-[#FF5400]/15 text-[#FF5400] border border-[#FF5400]/40 shadow-[0_0_15px_rgba(255,84,0,0.25)]' 
            : 'text-zinc-500 hover:bg-white/10 hover:text-white border border-transparent'
        }`;
      };

      // Training State
      const [isTraining, setIsTraining] = useState(false);
      const [progress, setProgress] = useState(100);
      const [liveLogs, setLiveLogs] = useState(MOCK_LOGS);
      const [liveLoss, setLiveLoss] = useState('0.02583');
      const [elapsedTime, setElapsedTime] = useState('01h 42m');

      // Auto-scroll logs
      useEffect(() => {
        if (activeTab === 'logs' && logsEndRef.current) {
          logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [activeTab, liveLogs]);

      const handleStartTraining = () => {
        if (isTraining) return;
        setIsTraining(true);
        setProgress(0);
        setLiveLogs([
          "[system] Initializing training pipeline...", 
          "[system] Compiling rendering kernels...",
          "[system] Allocating GPU memory... VRAM: 24GB active"
        ]);
        setElapsedTime('00m 00s');
        setActiveProject(prev => ({...prev, status: 'training'}));
        setActiveTab('logs');

        let step = 0;
        const maxSteps = 200;
        const interval = setInterval(() => {
          step += 1;
          const currentProgress = (step / maxSteps) * 100;
          setProgress(currentProgress);
          
          if (step % 10 === 0) {
            const loss = (Math.random() * 0.05 + 0.01).toFixed(5);
            const l1 = (Math.random() * 0.02 + 0.005).toFixed(5);
            setLiveLoss(loss);
            
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
            
            setLiveLogs(prev => [...prev, `${timeStr} Train step ${step * 15}/${maxSteps * 15}: loss=${loss}, l1=${l1}, ssim=0.88`]);
          }
          
          const m = Math.floor((step * 3) / 60);
          const s = (step * 3) % 60;
          setElapsedTime(`${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`);

          if (step >= maxSteps) {
            clearInterval(interval);
            setIsTraining(false);
            setActiveProject(prev => ({...prev, status: 'ready'}));
            setLiveLogs(prev => [...prev, "[success] Export completed successfully. Splats processed."]);
          }
        }, 60); 
      };

      const handleStopTraining = () => {
        if (!isTraining) return;
        setIsTraining(false);
        setActiveProject(prev => ({...prev, status: 'idle'}));
        setLiveLogs(prev => [...prev, "[system] Training aborted by user."]);
      };

      const handleSketchUpExportClick = () => {
        setIsSketchUpModalOpen(true);
      };

      const handleSketchUpExportConfirm = () => {
        setIsSketchUpModalOpen(false);
        setSketchUpExportState('loading');
        
        setTimeout(() => {
          if (activeProject.name === 'Meow_Dataset_Final') {
            setSketchUpExportState('failed');
            setExportErrorMsg("Failed Connection: The SketchUp instance stopped responding or closed the connection unexpectedly.");
          } else {
            setSketchUpExportState('success');
            setTimeout(() => {
              setSketchUpExportState('idle');
            }, 2500);
          }
        }, 1500);
      };

      const closeErrorPopup = () => {
        setExportErrorMsg(null);
        setSketchUpExportState('idle');
      };

      return (
        <div className="h-screen w-full flex flex-col bg-[#050505] text-white overflow-hidden relative font-sans">
          <div className="noise-bg" />
          
          {/* --- NATIVE APP MENU BAR --- */}
          <div className="h-8 border-b border-white/[0.08] flex items-center px-4 gap-4 text-[12px] text-zinc-400 bg-[#050505]/95 z-50 font-medium relative shadow-sm">
             <div className="flex items-center gap-2 mr-2">
                <Box className="w-3.5 h-3.5 text-[#FF5400]" />
                <span className="font-bold text-zinc-200 tracking-wide pr-2">Gaussian Points Studio</span>
             </div>
             
             <div className="flex items-center gap-1 h-full">
               <TopMenuDropdown label="File">
                 <MenuItem label="New Project..." shortcut="CTRL+N" icon={Folder} />
                 <MenuItem label="Open Project..." shortcut="CTRL+O" icon={Folder} />
                 <MenuSeparator />
                 <MenuItem label="Save" shortcut="CTRL+S" icon={Copy} />
                 <MenuItem label="Save As..." shortcut="CTRL+SHIFT+S" />
                 <MenuSeparator />
                 <MenuItem label="Export">
                   <MenuItem label="Export as .ply" icon={Download} />
                   <MenuItem label="Export to SketchUp" icon={ArrowUpRight} />
                   <MenuSeparator />
                   <MenuItem label="Export Sequence" icon={Video} />
                 </MenuItem>
                 <MenuSeparator />
                 <MenuItem label="Exit" shortcut="ALT+F4" />
               </TopMenuDropdown>

               <TopMenuDropdown label="Edit">
                 <MenuItem label="Undo" shortcut="CTRL+Z" icon={RotateCcw} />
                 <MenuItem label="Redo" shortcut="CTRL+Y" icon={RotateCcw} />
                 <MenuSeparator />
                 <MenuItem label="Cut" shortcut="CTRL+X" />
                 <MenuItem label="Copy" shortcut="CTRL+C" icon={Copy} />
                 <MenuItem label="Paste" shortcut="CTRL+V" />
                 <MenuSeparator />
                 <MenuItem label="Preferences" shortcut="CTRL+," icon={Settings} />
               </TopMenuDropdown>

               <TopMenuDropdown label="View">
                 <MenuItem label="Reset Viewport" shortcut="SPACE" icon={Maximize} />
                 <MenuSeparator />
                 <MenuItem label="Appearance">
                   <MenuItem label="Dark Mode" />
                   <MenuItem label="Light Mode" />
                   <MenuSeparator />
                   <MenuItem label="High Contrast" />
                 </MenuItem>
                 <MenuItem label="Show grid" icon={Activity} />
                 <MenuItem label="Toggle Bounding Box" icon={BoxSelect} />
               </TopMenuDropdown>

               <TopMenuDropdown label="Tools">
                 <MenuItem label="Camera Tools" icon={Camera}>
                   <MenuItem label="Fly Mode" />
                   <MenuItem label="Orbit Mode" />
                   <MenuItem label="Walk Mode" />
                 </MenuItem>
                 <MenuItem label="Transform" icon={Move}>
                   <MenuItem label="Translate" />
                   <MenuItem label="Rotate" />
                   <MenuItem label="Scale" />
                 </MenuItem>
                 <MenuSeparator />
                 <MenuItem label="Point Selection" icon={MousePointer2} />
                 <MenuItem label="Color Picker" icon={Pipette} />
               </TopMenuDropdown>

               <TopMenuDropdown label="Window">
                 <MenuItem label="Project Explorer" />
                 <MenuItem label="Properties" />
                 <MenuItem label="Console" icon={Terminal} />
                 <MenuSeparator />
                 <MenuItem label="Workspace Layout">
                   <MenuItem label="Default" />
                   <MenuItem label="Training Focused" />
                   <MenuItem label="Inspection Focused" />
                 </MenuItem>
               </TopMenuDropdown>

               <TopMenuDropdown label="Help">
                 <MenuItem label="Documentation" />
                 <MenuItem label="Tutorials" />
                 <MenuSeparator />
                 <MenuItem label="About Gaussian Studio" icon={Box} />
               </TopMenuDropdown>
             </div>

             <div className="ml-auto flex items-center gap-4">
               <button className="flex items-center gap-1.5 hover:text-white transition-colors border-l border-white/5 pl-4 mr-1">
                 <Users className="w-3.5 h-3.5" />
                 Community Gallery
               </button>
               <button className="flex items-center gap-1.5 hover:text-white transition-colors text-[#00F0FF] bg-[#00F0FF]/10 px-2 py-0.5 rounded border border-[#00F0FF]/20">
                 <UserCircle2 className="w-3.5 h-3.5" />
                 Sign In
               </button>
             </div>
          </div>

          <div className="flex-1 flex overflow-hidden relative">
            
            {/* --- EXTREME LEFT TOOLBAR --- */}
            <div className="w-[52px] border-r border-[#000] bg-[#050505] flex flex-col items-center py-4 gap-3 z-40 relative shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
               <button onClick={() => setActiveLeftTab('projects')} title="Projects" className={getToolbarBtnClass('projects')}>
                   <Folder className="w-4 h-4" />
               </button>
               
               <div className="w-4 h-px bg-white/10 my-1 rounded-full" />

               <button onClick={() => setActiveLeftTab('select')} title="Select Tool" className={getToolbarBtnClass('select')}>
                   <MousePointer2 className="w-4 h-4" />
               </button>
               <button onClick={() => setActiveLeftTab('move')} title="Move Tool" className={getToolbarBtnClass('move')}>
                   <Move className="w-4 h-4" />
               </button>
               <button onClick={() => setActiveLeftTab('transform')} title="Transform Tool" className={getToolbarBtnClass('transform')}>
                   <RotateCcw className="w-4 h-4" />
               </button>
               
               <div className="w-4 h-px bg-white/10 my-1 rounded-full" />
               
               <button onClick={() => setActiveLeftTab('clip')} title="Clipping Box Tool" className={getToolbarBtnClass('clip')}>
                   <BoxSelect className="w-4 h-4" />
               </button>
               <button onClick={() => setActiveLeftTab('color')} title="Color Picker" className={getToolbarBtnClass('color')}>
                   <Pipette className="w-4 h-4" />
               </button>

               <div className="mt-auto flex flex-col gap-3">
                   <button title="Preferences" className="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/10 text-zinc-400 hover:text-white transition-colors border border-transparent">
                       <Settings className="w-4 h-4" />
                   </button>
               </div>
            </div>

            {/* --- MAIN GRID LAYOUT --- */}
            <div className="flex-1 relative grid grid-cols-[280px_1fr_360px] text-[14px] min-h-0">

              {/* --- LEFT SIDEBAR: DYNAMIC CONTENT --- */}
              <aside className="border-r border-[var(--border-color)] bg-[#0A0A0D]/90 backdrop-blur-2xl flex flex-col z-20 relative transition-all duration-300 min-h-0 overflow-hidden">
                
                {/* 1. PROJECTS PANEL */}
                {activeLeftTab === 'projects' && (
                  <>
                    <div className="h-16 flex items-center px-6 border-b border-[var(--border-color)] justify-between shrink-0">
                      <div className="font-bold text-zinc-200 tracking-wide uppercase text-xs flex items-center gap-2">
                        Project Explorer
                      </div>
                    </div>

                    <div className="p-4 shrink-0">
                      <button className="w-full py-2.5 px-4 rounded-lg bg-white/[0.03] hover:bg-white/[0.08] border border-white/10 text-sm font-semibold transition-all flex items-center justify-center gap-2 text-white group outline-none">
                        <Camera className="w-4 h-4 text-zinc-400 group-hover:text-white transition-colors" />
                        New Project
                      </button>
                    </div>

                    <div className="flex-1 overflow-y-auto custom-scrollbar px-3 pb-4">
                      <div className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 px-3 mt-1">Recent Local Projects</div>
                      <div className="space-y-[2px]">
                        {PROJECTS.map(project => {
                          const isActive = activeProject.id === project.id;
                          return (
                            <div
                              key={project.id}
                              onClick={() => {
                                if (!isTraining) {
                                  setActiveProject(project);
                                  setProgress(project.status === 'ready' ? 100 : 0);
                                }
                              }}
                              className={`w-full flex items-center justify-between px-3 py-3 rounded-lg transition-all duration-200 group relative cursor-pointer
                                ${isActive 
                                  ? 'bg-gradient-to-r from-[#FF5400]/10 to-transparent border border-[#FF5400]/20 text-white' 
                                  : 'text-zinc-400 hover:bg-white/[0.04] border border-transparent hover:text-white'
                                } ${isTraining && !isActive ? 'opacity-50 cursor-not-allowed' : ''}`}
                            >
                              {isActive && <div className="active-glow" />}
                              <div className="flex items-center gap-3 overflow-hidden">
                                <Folder className={`w-4 h-4 shrink-0 ${isActive ? 'text-[#FF5400]' : 'text-zinc-500 group-hover:text-zinc-300 transition-colors'}`} />
                                <span className="text-sm truncate text-left font-medium select-none">{project.name}</span>
                              </div>
                              
                              <div className="relative flex items-center justify-end w-[50px] shrink-0">
                                <div className={`absolute flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity ${isTraining ? 'hidden' : ''}`}>

                        }

                        return (
                          <div key={index} className="hover:bg-white/[0.04] px-1 -mx-1 rounded transition-colors break-words">
                            {isTimestamp ? (
                              <>
                                <span className="text-zinc-600 mr-2">{log.substring(0, 10)}</span>
                                <span className={
                                  isSuccess ? 'text-emerald-400 font-medium' : 
                                  isMetric ? 'text-[#00F0FF]' : 
                                  'text-zinc-300'
                                }>
                                  {log.substring(10)}
                                </span>
                              </>
                            ) : (
                              <span>{log}</span>
                            )}
                          </div>
                        );
                      })}
                      <div className="text-zinc-500 mt-2 flex items-center">
                        C:\Users\illia\Companion&gt; {isTraining ? '...' : <span className="terminal-cursor"></span>}
                      </div>
                      <div ref={logsEndRef} />
                    </div>
                  </div>

                </div>
              </aside>
            </div>
          </div>

          {/* SketchUp Export Modal */}
          {isSketchUpModalOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-[#0A0A0D] border border-white/10 rounded-2xl shadow-2xl w-[400px] overflow-hidden transform transition-all scale-100 flex flex-col">
                <div className="p-5 border-b border-white/5 flex justify-between items-center bg-gradient-to-r from-white/[0.02] to-transparent">
                  <h3 className="text-white font-semibold flex items-center gap-2">
                    <Box className="w-4 h-4 text-[#FF5400]" />
                    Target SketchUp Instance
                  </h3>
                  <button onClick={() => setIsSketchUpModalOpen(false)} className="text-zinc-500 hover:text-white transition-colors">
                    <X className="w-4 h-4" />
                  </button>
                </div>
                <div className="p-5 space-y-3">
                  <p className="text-xs text-zinc-400 mb-4">Select the open SketchUp project to receive the trained splat geometry.</p>
                  
                  <div className="flex flex-col gap-2">
                    {SKETCHUP_PROCESSES.map(proc => (
                      <div 
                        key={proc.id}
                        onClick={() => setSelectedProcess(proc.id)}
                        className={`p-3 rounded-xl border cursor-pointer transition-all flex items-center gap-3 ${selectedProcess === proc.id ? 'bg-[#FF5400]/10 border-[#FF5400]/50 shadow-[0_0_15px_rgba(255,84,0,0.1)]' : 'bg-white/[0.02] border-white/5 hover:border-white/20'}`}
                      >
                        <div className={`w-4 h-4 rounded-full border flex items-center justify-center shrink-0 ${selectedProcess === proc.id ? 'border-[#FF5400]' : 'border-zinc-600'}`}>
                          {selectedProcess === proc.id && <div className="w-2 h-2 rounded-full bg-[#FF5400]" />}
                        </div>
                        
                        <div className="flex-1 overflow-hidden pl-1">
                          <div className={`text-sm font-semibold truncate ${selectedProcess === proc.id ? 'text-white' : 'text-zinc-300'}`}>{proc.name}</div>
                          <div className="text-[10px] text-zinc-500 mt-1">{proc.desc}</div>
                        </div>

                        <div className="w-16 h-11 bg-black/50 rounded overflow-hidden shrink-0 border border-white/10 group-hover:border-white/30 shadow-inner ml-2">
                          <img src={proc.image} alt="Preview" className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="p-4 border-t border-white/5 bg-black/20 flex gap-3 mt-auto">
                  <button onClick={() => setIsSketchUpModalOpen(false)} className="flex-1 py-2 rounded-lg text-xs font-semibold text-zinc-400 hover:text-white hover:bg-white/5 transition-all">Cancel</button>
                  <button onClick={handleSketchUpExportConfirm} className="flex-1 py-2 rounded-lg bg-[#FF5400] hover:bg-[#FF6A22] text-white shadow-[0_0_15px_rgba(255,84,0,0.3)] text-xs font-bold transition-all">Start Export</button>
                </div>
              </div>
            </div>
          )}

          {/* Error Popup */}
          {exportErrorMsg && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-[#0A0A0D] border border-rose-500/30 rounded-2xl shadow-[0_0_50px_rgba(225,29,72,0.15)] w-[380px] overflow-hidden transform transition-all scale-100 flex flex-col">
                <div className="p-5 border-b border-rose-500/10 flex justify-between items-center bg-rose-500/5">
                  <h3 className="text-rose-400 font-semibold flex items-center gap-2">
                    <AlertTriangle className="w-5 h-5 text-rose-500" />
                    Export Failed
                  </h3>
                  <button onClick={closeErrorPopup} className="text-zinc-500 hover:text-white transition-colors">
                    <X className="w-4 h-4" />
                  </button>
                </div>
                <div className="p-6">
                  <p className="text-sm text-zinc-300 leading-relaxed font-medium">{exportErrorMsg}</p>
                </div>
                <div className="p-4 border-t border-white/5 bg-black/20 flex gap-3 mt-auto">
                  <button onClick={closeErrorPopup} className="w-full py-2.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-white shadow-inner text-xs font-bold transition-all border border-white/10">Dismiss</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
